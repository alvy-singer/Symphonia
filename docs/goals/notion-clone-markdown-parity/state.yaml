# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Notion Clone Markdown Parity"
  slug: "notion-clone-markdown-parity"
  kind: specific
  tranche: "Complete successive safe verified frontend and backend slices until markdown page creation/editing is Notion-clone-parity for the provided screenshots and reference."
  status: active
  intake:
    original_request: "make current markdown creation rlanrid/notion-clone.git-parity, both in frontend and backend terms. Look at the screenshots to get what the final result should be"
    interpreted_outcome: "Symphonia's markdown creation flow should behave like the linked Notion clone, including UI page creation/editing affordances and backend persistence/contracts."
    input_shape: specific
    audience: "Symphonia users creating and editing markdown/planning documents"
    authority: requested
    proof_type: test
    completion_proof: "Browser verification shows the Notion-like create/edit/delete/slash-menu flow works locally, and focused frontend/backend tests or HTTP smoke checks prove persisted markdown/page state survives through the app contracts."
    likely_misfire: "Only restyling the current raw markdown textarea or creating a static mock while leaving page lifecycle, slash-command behavior, or backend persistence incomplete."
    blind_spots_considered:
      - "The linked reference repo must be inspected read-only during /goal, not assumed from memory."
      - "The screenshots emphasize a light Notion-style editor while the current app screenshot is dark and raw-textarea-oriented."
      - "Frontend parity must not bypass existing repository-backed artifact semantics."
      - "Backend parity must be explicit: create, list, update, delete, and persist document/page state."
      - "The screen recording may reveal interaction details not visible in still screenshots."
    existing_plan_facts:
      - "Reference repo: https://github.com/rlanrid/notion-clone.git"
      - "Screenshot target: /Users/diegomarono/Desktop/Screenshot 2026-05-29 at 10.07.13.png"
      - "Screenshot target: /Users/diegomarono/Desktop/Screenshot 2026-05-29 at 10.10.43.png"
      - "Screenshot target: /Users/diegomarono/Desktop/Screenshot 2026-05-29 at 10.11.16.png"
      - "Screen recording target: /Users/diegomarono/Desktop/Screen Recording 2026-05-29 at 10.12.41.mov"
      - "Visible target UI: light left sidebar with workspace/search/settings/new page/page list/add page/trash."
      - "Visible target UI: centered untitled document canvas, Publish and ellipsis actions, placeholder text for slash commands."
      - "Visible target UI: slash menu for H1, H2, H3, bullet list, numbered list, paragraph, and image."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/notion-clone-markdown-parity"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: T999

